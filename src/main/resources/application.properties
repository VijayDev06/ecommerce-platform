spring.application.name=ecommerce-backend

server.port=7001

# MySQL connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Root

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration-time=3600000

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.success.url=http://localhost:7001/api/payment/success
stripe.cancel.url=http://localhost:7001/api/payment/cancel

spring.reactor.debug-agent.enabled=true

